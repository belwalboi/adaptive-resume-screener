services:
  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    container_name: adaptive_resume_backend
    ports:
      - "8000:8000"
    environment:
      - RETRAIN_MIN_FEEDBACK=${RETRAIN_MIN_FEEDBACK:-100}
      - RETRAIN_AUTO_ENABLED=${RETRAIN_AUTO_ENABLED:-true}
      - RETRAIN_EPOCHS=${RETRAIN_EPOCHS:-20}
      - RETRAIN_MIN_NEW_SAMPLES=${RETRAIN_MIN_NEW_SAMPLES:-10}
      - RETRAIN_MIN_VAL_ACCURACY=${RETRAIN_MIN_VAL_ACCURACY:-0.55}
      - MODEL_THRESHOLD=${MODEL_THRESHOLD:-0.30}
    volumes:
      - ./database:/app/database
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    container_name: adaptive_resume_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
